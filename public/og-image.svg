      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- QR pattern left -->
  <g fill="rgba(42,127,127,0.15)">
    <rect x="60" y="100" width="40" height="40"/><rect x="110" y="100" width="40" height="40"/><rect x="160" y="100" width="40" height="40"/>
    <rect x="60" y="150" width="40" height="40"/><rect x="160" y="150" width="40" height="40"/>
    <rect x="60" y="200" width="40" height="40"/><rect x="110" y="200" width="40" height="40"/><rect x="160" y="200" width="40" height="40"/>
    <rect x="260" y="100" width="40" height="40"/><rect x="310" y="150" width="40" height="40"/><rect x="260" y="200" width="40" height="40"/>
  </g>
  <!-- QR pattern right -->
  <g fill="rgba(42,127,127,0.15)">
    <rect x="1000" y="380" width="40" height="40"/><rect x="1050" y="380" width="40" height="40"/><rect x="1100" y="380" width="40" height="40"/>
    <rect x="1000" y="430" width="40" height="40"/><rect x="1100" y="430" width="40" height="40"/>
    <rect x="1000" y="480" width="40" height="40"/><rect x="1050" y="480" width="40" height="40"/><rect x="1100" y="480" width="40" height="40"/>
    <rect x="900" y="380" width="40" height="40"/><rect x="850" y="430" width="40" height="40"/><rect x="900" y="480" width="40" height="40"/>
  </g>
  <!-- Title -->
